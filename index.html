<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>ידידיה — שיעורים</title>
  <link rel="stylesheet" href="app.css" />
  <script src="config.js"></script>
</head>
<body>

  <!-- ── Sign-in ── -->
  <div id="screen-signin" class="screen">
    <div class="signin-card">
      <div class="signin-logo">
        <img src="podcast_pi.png" alt="בונים אהבה לאור ההלכה" class="signin-logo-img" />
      </div>
      <h1>ידידיה</h1>
      <p class="signin-subtitle">בונים אהבה לאור ההלכה</p>
      <button id="btn-signin" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.7 13.1 17.9 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
          <path fill="#FBBC05" d="M10.8 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A24 24 0 0 0 0 24c0 3.8.9 7.4 2.5 10.7l8.3-6z"/>
          <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.3-8.4 2.3-6.1 0-11.3-4.1-13.2-9.7l-7.8 6A23.9 23.9 0 0 0 24 48z"/>
        </svg>
        כניסה עם Google
      </button>
      <p id="signin-error" class="error hidden"></p>
    </div>
  </div>

  <!-- ── Episode list ── -->
  <div id="screen-list" class="screen hidden">
    <header class="topbar">
      <button id="btn-signout" class="btn-signout-top" title="יציאה" aria-label="יציאה">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
      <div class="topbar-center">
        <img src="podcast_pi.png" alt="בונים אהבה לאור ההלכה" class="topbar-logo-img" />
      </div>
      <button id="btn-search-toggle" class="btn-icon" aria-label="חיפוש">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </header>

    <div id="search-bar" class="search-bar hidden">
      <input id="search-input" type="search" placeholder="חפש שיעור…" class="search-input" autocomplete="off" />
    </div>

    <div id="list-status" class="status-bar hidden"></div>
    <div id="file-list" class="episode-list"></div>

    <div id="loading" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p>טוען שיעורים…</p>
    </div>
  </div>

  <!-- ── Full player ── -->
  <div id="screen-player" class="player-screen">
    <div class="player-header">
      <button id="btn-player-close" class="btn-player-close" aria-label="סגור">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <span class="now-playing-label">מתנגן עכשיו</span>
      <div style="width:36px"></div>
    </div>

    <div class="player-meta">
      <div class="player-track-artist">ידידיה</div>
      <div id="player-title" class="player-track-title">בחר שיעור</div>
    </div>

    <div class="player-progress">
      <input id="player-seek" type="range" min="0" max="100" value="0" class="player-seek" />
      <div class="player-times" dir="ltr">
        <span id="player-pos">0:00</span>
        <span id="player-dur">0:00</span>
      </div>
    </div>

    <div class="player-controls">
      <button id="btn-skip-back" class="btn-ctrl-player btn-skip" aria-label="אחורה 15 שניות">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.53"/>
        </svg>
        <span class="skip-label">15</span>
      </button>
      <button id="btn-play" class="btn-play-main" aria-label="נגן/עצור">
        <svg id="icon-play" width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
        <svg id="icon-pause" width="30" height="30" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
      </button>
      <button id="btn-skip-fwd" class="btn-ctrl-player btn-skip" aria-label="קדימה 30 שניות">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.53"/>
        </svg>
        <span class="skip-label">30</span>
      </button>
    </div>

    <div class="player-footer">
      <button id="btn-prev" class="btn-nav" aria-label="הקודם">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="19 20 9 12 19 4 19 20"/><rect x="4" y="4" width="3" height="16" rx="1"/>
        </svg>
      </button>
      <button id="btn-speed" class="btn-speed" aria-label="מהירות ניגון">1×</button>
      <button id="btn-next" class="btn-nav" aria-label="הבא">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 4 15 12 5 20 5 4"/><rect x="17" y="4" width="3" height="16" rx="1"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Mini player (always in DOM, slides up) ── -->
  <div id="mini-player" class="mini-player">
    <div class="mini-inner" id="mini-player-tap">
      <div class="mini-art">
        <img src="podcast_pi.png" alt="" class="mini-art-img" />
      </div>
      <div class="mini-info">
        <div id="mini-title" class="mini-title-text">ידידיה</div>
        <div class="mini-prog-track">
          <div id="mini-progress" class="mini-prog-fill"></div>
        </div>
      </div>
    </div>
    <button id="mini-play" class="mini-btn" aria-label="נגן/עצור">
      <svg id="mini-icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
      <svg id="mini-icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
    </button>
    <button id="mini-next" class="mini-btn" aria-label="הבא">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 4 15 12 5 20 5 4"/>
        <rect x="17" y="4" width="3" height="16" rx="1"/>
      </svg>
    </button>
  </div>

  <audio id="audio" preload="none"></audio>
  <script src="app.js"></script>
</body>
</html>
