<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a6b3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ידידיה — שיעורים</title>
  <link rel="stylesheet" href="app.css" />
  <script src="config.js"></script>
</head>
<body>

  <!-- Sign-in screen -->
  <div id="screen-signin" class="screen">
    <div class="signin-card">
      <div class="app-icon">🎙️</div>
      <h1>ידידיה</h1>
      <p class="subtitle">שיעורים</p>
      <button id="btn-signin" class="btn-primary">
        <svg width="20" height="20" viewBox="0 0 48 48" style="vertical-align:middle;margin-left:8px">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.7 13.1 17.9 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
          <path fill="#FBBC05" d="M10.8 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A24 24 0 0 0 0 24c0 3.8.9 7.4 2.5 10.7l8.3-6z"/>
          <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.3-8.4 2.3-6.1 0-11.3-4.1-13.2-9.7l-7.8 6A23.9 23.9 0 0 0 24 48z"/>
        </svg>
        כניסה עם Google
      </button>
      <p id="signin-error" class="error hidden"></p>
    </div>
  </div>

  <!-- File list screen -->
  <div id="screen-list" class="screen hidden">
    <header class="topbar">
      <span class="topbar-title">ידידיה — שיעורים</span>
      <button id="btn-signout" class="btn-icon" title="יציאה">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <div id="list-status" class="status-bar hidden"></div>

    <div id="file-list" class="file-list"></div>

    <div id="loading" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p>טוען שיעורים…</p>
    </div>
  </div>

  <!-- Player bar -->
  <div id="player-bar" class="player-bar hidden">
    <div class="player-top-row">
      <div id="player-title" class="player-title"></div>
      <button id="btn-speed" class="btn-speed" aria-label="מהירות ניגון">1×</button>
    </div>
    <div class="player-controls">
      <button id="btn-prev" class="btn-ctrl" aria-label="הקודם">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round">
          <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke-width="2"/>
        </svg>
      </button>
      <button id="btn-skip-back" class="btn-ctrl" aria-label="אחורה 15 שניות">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.53"/>
          <text x="12.5" y="13.5" text-anchor="middle" dominant-baseline="middle" stroke="none" fill="currentColor" font-size="6.5" font-weight="700" font-family="-apple-system,sans-serif">15</text>
        </svg>
      </button>
      <button id="btn-play" class="btn-ctrl btn-play-pause" aria-label="נגן/עצור">
        <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button id="btn-skip-fwd" class="btn-ctrl" aria-label="קדימה 30 שניות">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.53"/>
          <text x="11.5" y="13.5" text-anchor="middle" dominant-baseline="middle" stroke="none" fill="currentColor" font-size="6.5" font-weight="700" font-family="-apple-system,sans-serif">30</text>
        </svg>
      </button>
      <button id="btn-next" class="btn-ctrl" aria-label="הבא">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke-width="2"/>
        </svg>
      </button>
    </div>
    <div class="player-progress-wrap">
      <span id="player-pos">0:00</span>
      <input id="player-seek" type="range" min="0" max="100" value="0" class="player-seek" />
      <span id="player-dur">0:00</span>
    </div>
  </div>

  <!-- Hidden HTML5 audio element -->
  <audio id="audio" preload="none"></audio>

  <script src="app.js"></script>
</body>
</html>
